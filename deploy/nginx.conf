server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache images aggressively (30 days)
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache the HTML for 1 hour (allows updates to propagate)
    location = /index.html {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Gzip everything compressible
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
}
